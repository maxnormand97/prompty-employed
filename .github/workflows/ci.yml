# CI workflow: install → lint → typecheck → build → test
# Runs on every push and pull request targeting the main branch.
# Any failing step will abort the workflow and mark the check as failed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # pnpm must be set up before setup-node so the cache key is correct.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # Version is read automatically from packageManager in package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Build runs before typecheck because next build regenerates
      # packages/web/next-env.d.ts (which is gitignored). Without it on a
      # fresh checkout, tsc --noEmit would run against incomplete type
      # declarations and may produce spurious errors.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
